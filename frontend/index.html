<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slack Chatbot Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{--bg:#eef0f7;--surface:#f7f5fc;--border:#ddd7ef;--text:#2c2840;--muted:#7b73a0;--ok:#3d9e7e;--warn:#9e7820;--err:#c45468;--accent:#8c78c8}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0}
    h1{font-size:18px;margin:0} .pill{border:1px solid var(--border);padding:6px 10px;border-radius:999px;font-size:12px;background:#fff}
    .pill.ok{color:var(--ok)} .pill.warn{color:var(--warn)} .pill.err{color:var(--err)}
    .wrap{display:grid;grid-template-columns:420px 1fr;gap:18px;padding:18px;max-width:1400px;margin:0 auto}
    .panel,.output{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
    .panel{margin-bottom:16px} .panel h2{font-size:15px;margin:0 0 12px}
    .field{display:flex;flex-direction:column;gap:6px;margin:12px 0} select,input,button,textarea{font:inherit}
    select,input,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#fff}
    textarea{min-height:90px;resize:vertical} .row{display:flex;gap:8px;flex-wrap:wrap}
    button{padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:#fff;cursor:pointer}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent)} button.danger{color:var(--err)}
    .status{font-size:12px;color:var(--muted);margin-top:8px} pre{white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.5}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <h1>Slack Chatbot Dashboard</h1>
  <span class="pill" id="pill">Idle</span>
</header>
<div class="wrap">
  <div>
    <div class="panel">
      <h2>1. Connect</h2>
      <div class="row">
        <button class="primary" onclick="connectSlack()">Connect Slack</button>
        <button onclick="loadWorkspaces()">Load Workspaces</button>
        <button onclick="checkToken()">Token Status</button>
        <button class="danger" onclick="disconnectWorkspace()">Disconnect</button>
      </div>
      <div class="field">
        <label>Workspace</label>
        <select id="workspaceSelect" onchange="loadChannels()">
          <option value="">— loading —</option>
        </select>
      </div>
      <div class="status" id="status">Ready</div>
    </div>

    <div class="panel">
      <h2>2. Channel</h2>
      <div class="field">
        <label>Channel</label>
        <select id="channelSelect"><option value="">— Load channels first —</option></select>
      </div>
      <div class="row">
        <button onclick="joinSelectedAndBackfill()">Join + Backfill</button>
        <button onclick="joinAllAndBackfill()">Join All Public</button>
        <button onclick="loadMessagesFromDB()">Load from DB</button>
      </div>
    </div>

    <div class="panel">
      <h2>3. Search</h2>
      <div class="field"><label>Keyword</label><input id="q" placeholder="deployment, bug, deadline" /></div>
      <div class="row"><input id="fromDate" type="date" /><input id="toDate" type="date" /></div>
      <div class="row"><button onclick="searchMessages()">Search</button></div>
    </div>

    <div class="panel">
      <h2>4. Chat</h2>
      <div class="field"><label>Question</label><textarea id="question" placeholder="What did we decide about deployment?"></textarea></div>
      <div class="row"><button onclick="askChat()">Ask</button></div>
    </div>
  </div>

  <div class="output">
    <h2 style="margin-top:0">Output</h2>
    <pre id="out">Waiting…</pre>
  </div>
</div>
<script>
  function getApiBase(){ return window.location.origin + "/api"; }
  function setStatus(msg, type=""){
    const s=document.getElementById("status"), p=document.getElementById("pill");
    s.textContent=msg; p.textContent=msg.length>24?msg.slice(0,24)+"…":msg; p.className="pill"+(type?" "+type:"");
  }
  function show(obj){ document.getElementById("out").textContent = JSON.stringify(obj, null, 2); }
  async function safeJson(r){ const t=await r.text(); try{return JSON.parse(t);}catch{return {ok:false,raw:t,status:r.status};} }

  window.addEventListener("message", async (event) => {
    const data = event.data || {};
    if (data.type === "slack_oauth_success") {
      setStatus("Workspace connected","ok");
      await loadWorkspaces(data.team_id || "");
    } else if (data.type === "slack_oauth_error") {
      show({ok:false, oauth_error:data.error});
      setStatus("Connect failed","err");
    }
  });

  function connectSlack(){
    setStatus("Opening Slack OAuth…");
    const win = window.open(getApiBase()+"/install", "slack_oauth_popup", "width=700,height=800,menubar=no,toolbar=no,location=yes,resizable=yes,scrollbars=yes,status=no");
    if(!win) setStatus("Popup blocked","err");
  }

  async function loadWorkspaces(preferredTeamId=""){
    try{
      setStatus("Loading workspaces…");
      const r = await fetch(getApiBase()+"/workspaces");
      const data = await safeJson(r); show(data);
      const sel=document.getElementById("workspaceSelect");
      const ch=document.getElementById("channelSelect");
      sel.innerHTML=""; ch.innerHTML='<option value="">— Load channels first —</option>';
      if(!data.ok){ sel.innerHTML='<option value="">— failed to load workspaces —</option>'; setStatus("Workspaces load failed","err"); return; }
      const list=data.workspaces||[];
      if(list.length===0){ sel.innerHTML='<option value="">— none connected yet —</option>'; setStatus("No workspaces connected","warn"); return; }
      let found=false;
      list.forEach((w,idx)=>{
        const opt=document.createElement("option");
        opt.value=w.team_id; opt.textContent=w.team_name?`${w.team_name} • ${w.team_id}`:w.team_id;
        if((preferredTeamId && w.team_id===preferredTeamId) || (!preferredTeamId && idx===0)){ opt.selected=true; found=true; }
        sel.appendChild(opt);
      });
      if(!found && sel.options.length>0) sel.selectedIndex=0;
      setStatus("Workspaces loaded","ok");
      if(sel.value) await loadChannels();
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Workspaces load failed","err"); }
  }

  async function disconnectWorkspace(){
    try{
      const sel=document.getElementById("workspaceSelect");
      const team_id=sel.value;
      if(!team_id){ setStatus("Select workspace first","warn"); return; }
      if(!confirm("Disconnect this workspace? This will revoke the token and delete the secret.")) return;
      setStatus("Disconnecting…");
      const r = await fetch(getApiBase()+"/workspaces/"+encodeURIComponent(team_id), {method:"DELETE"});
      const data = await safeJson(r); show(data);
      if(!data.ok){ setStatus("Disconnect failed","err"); return; }
      setStatus("Disconnected","ok");
      await loadWorkspaces();
      window.location.reload();
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Disconnect failed","err"); }
  }

  async function checkToken(){
    try{
      const team_id=document.getElementById("workspaceSelect").value;
      if(!team_id){ setStatus("Select workspace first","warn"); return; }
      setStatus("Checking token…");
      const r=await fetch(getApiBase()+"/token/status?team_id="+encodeURIComponent(team_id));
      const data=await safeJson(r); show(data);
      setStatus(data.ok && data.has_token ? "Token OK" : "Token missing", data.ok && data.has_token ? "ok" : "warn");
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Token check failed","err"); }
  }

  async function loadChannels(){
    try{
      const team_id=document.getElementById("workspaceSelect").value;
      if(!team_id) return;
      setStatus("Loading channels…");
      const r=await fetch(getApiBase()+"/channels?team_id="+encodeURIComponent(team_id));
      const data=await safeJson(r); show(data);
      const sel=document.getElementById("channelSelect"); sel.innerHTML="";
      if(!data.ok){ sel.innerHTML='<option value="">— failed to load channels —</option>'; setStatus("Channels load failed","err"); return; }
      const channels=data.channels||[];
      if(channels.length===0){ sel.innerHTML='<option value="">— no channels returned —</option>'; setStatus("No channels","warn"); return; }
      channels.forEach(c=>{ const opt=document.createElement("option"); opt.value=c.id; opt.textContent="#"+c.name; sel.appendChild(opt); });
      setStatus("Channels loaded","ok");
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Channels load failed","err"); }
  }

  async function backfillOneChannel(team_id, channel_id){
    let cursor="", totalStored=0;
    while(true){
      const url=getApiBase()+"/backfill-channel?team_id="+encodeURIComponent(team_id)+"&channel_id="+encodeURIComponent(channel_id)+"&limit=200"+(cursor?"&cursor="+encodeURIComponent(cursor):"");
      const r=await fetch(url,{method:"POST"}); const data=await safeJson(r);
      if(!data.ok) return {ok:false,error:data};
      totalStored += (data.stored_new || 0);
      if(!data.has_more) break;
      cursor = data.next_cursor || "";
      await new Promise(res=>setTimeout(res,350));
    }
    return {ok:true, stored:totalStored};
  }

  async function joinSelectedAndBackfill(){
    try{
      const team_id=document.getElementById("workspaceSelect").value;
      const channel_id=document.getElementById("channelSelect").value;
      if(!team_id || !channel_id){ setStatus("Select workspace + channel first","warn"); return; }
      setStatus("Joining channel…");
      const r=await fetch(getApiBase()+"/join-channel?team_id="+encodeURIComponent(team_id)+"&channel_id="+encodeURIComponent(channel_id),{method:"POST"});
      const j=await safeJson(r); if(!j.ok){ show(j); setStatus("Join failed","err"); return; }
      setStatus("Backfilling…");
      const bf=await backfillOneChannel(team_id, channel_id);
      show({join:j, backfill:bf});
      setStatus(bf.ok ? "Done" : "Backfill failed", bf.ok ? "ok" : "err");
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Join/backfill failed","err"); }
  }

  async function joinAllAndBackfill(){
    try{
      const team_id=document.getElementById("workspaceSelect").value;
      if(!team_id){ setStatus("Select workspace first","warn"); return; }
      setStatus("Joining all public…");
      const r=await fetch(getApiBase()+"/join-all-public?team_id="+encodeURIComponent(team_id),{method:"POST"});
      const j=await safeJson(r); if(!j.ok){ show(j); setStatus("Join all failed","err"); return; }
      await loadChannels();
      const channels=(await safeJson(await fetch(getApiBase()+"/channels?team_id="+encodeURIComponent(team_id)))).channels || [];
      const results=[];
      for(const c of channels){
        setStatus("Backfilling #"+(c.name||c.id)+"…");
        const bf=await backfillOneChannel(team_id, c.id);
        results.push({channel_id:c.id, channel_name:c.name, backfill:bf});
      }
      show({join_all:j, results}); setStatus("All public channels processed","ok");
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Join all failed","err"); }
  }

  async function loadMessagesFromDB(){
    try{
      const team_id=document.getElementById("workspaceSelect").value;
      const channel_id=document.getElementById("channelSelect").value;
      if(!team_id || !channel_id){ setStatus("Select workspace + channel first","warn"); return; }
      setStatus("Loading DB messages…");
      const r=await fetch(getApiBase()+"/db-messages?team_id="+encodeURIComponent(team_id)+"&channel_id="+encodeURIComponent(channel_id)+"&limit=50");
      const data=await safeJson(r); show(data); setStatus(data.ok?"DB messages loaded":"DB load failed", data.ok?"ok":"err");
    }catch(e){ show({ok:false,error:String(e)}); setStatus("DB load failed","err"); }
  }

  async function searchMessages(){
    try{
      const team_id=document.getElementById("workspaceSelect").value;
      const channel_id=document.getElementById("channelSelect").value;
      const q=document.getElementById("q").value.trim();
      const from=document.getElementById("fromDate").value;
      const to=document.getElementById("toDate").value;
      if(!team_id || !channel_id){ setStatus("Select workspace + channel first","warn"); return; }
      const params=new URLSearchParams({team_id, channel_id, q, top_k:"10"}); if(from) params.set("from", from); if(to) params.set("to", to);
      setStatus("Searching…");
      const r=await fetch(getApiBase()+"/search?"+params.toString()); const data=await safeJson(r); show(data); setStatus(data.ok?"Search done":"Search failed", data.ok?"ok":"err");
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Search failed","err"); }
  }

  async function askChat(){
    try{
      const team_id=document.getElementById("workspaceSelect").value;
      const channel_id=document.getElementById("channelSelect").value;
      const question=document.getElementById("question").value.trim();
      const from_date=document.getElementById("fromDate").value;
      const to_date=document.getElementById("toDate").value;
      if(!team_id || !channel_id || !question){ setStatus("Select workspace + channel and type question","warn"); return; }
      setStatus("Thinking…");
      const r=await fetch(getApiBase()+"/chat", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({team_id, channel_id, question, from_date:from_date||null, to_date:to_date||null, top_k:10})});
      const data=await safeJson(r); show(data); setStatus(data.ok?"Answer ready":"Chat failed", data.ok?"ok":"err");
    }catch(e){ show({ok:false,error:String(e)}); setStatus("Chat failed","err"); }
  }

  loadWorkspaces();
</script>
</body>
</html>
