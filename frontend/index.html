<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slack Chatbot Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef0f7;
      --surface: #f7f5fc;
      --surface2: #ece9f5;
      --border: rgba(140,120,200,0.13);
      --border-hover: rgba(140,120,200,0.24);
      --text: #2c2840;
      --text-muted: #a49dbf;
      --text-soft: #7b73a0;
      --accent: #9b7fe8;
      --accent-glow: rgba(155,127,232,0.14);
      --danger: #e07a8a;
      --danger-bg: rgba(224,122,138,0.09);
      --success: #6dbfa0;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(185,160,245,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(130,210,190,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 70% 20%, rgba(245,170,185,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      background: rgba(238,240,247,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 26px; height: 26px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { display: block; }

    h1 { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }

    .pill {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-soft);
      transition: all 0.3s ease;
      letter-spacing: 0.02em;
    }
    .pill.ok   { border-color: rgba(109,191,160,0.35); color: #3d9e7e; background: rgba(109,191,160,0.12); }
    .pill.warn { border-color: rgba(220,170,80,0.35);  color: #9e7820; background: rgba(220,170,80,0.10); }
    .pill.err  { border-color: rgba(224,122,138,0.35); color: var(--danger); background: var(--danger-bg); }

    .wrap {
      position: relative; z-index: 1;
      display: grid; grid-template-columns: 360px 1fr;
      gap: 16px; padding: 20px 24px;
      max-width: 1200px; margin: 0 auto;
    }

    .sidebar { display: flex; flex-direction: column; gap: 10px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
      animation: fadeIn 0.3s ease both;
    }
    .panel:nth-child(1) { animation-delay: 0.00s; }
    .panel:nth-child(2) { animation-delay: 0.07s; }
    .panel:nth-child(3) { animation-delay: 0.14s; }
    .panel:hover { border-color: var(--border-hover); }

    .panel-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .step-badge {
      font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500;
      color: var(--text-muted); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 6px; letter-spacing: 0.05em;
    }

    .panel-title {
      font-size: 12px; font-weight: 600; color: var(--text-soft);
      letter-spacing: 0.03em; text-transform: uppercase;
    }

    .panel-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .hint { font-size: 12px; color: var(--text-muted); line-height: 1.55; }

    label {
      display: block; font-size: 11px; font-weight: 500;
      color: var(--text-muted); letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 5px;
    }

    input, select {
      width: 100%; padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none; -webkit-appearance: none;
    }
    select {
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23a49dbf' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px;
    }
    input:focus, select:focus {
      border-color: rgba(155,127,232,0.45);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input::placeholder { color: var(--text-muted); font-size: 12px; }

    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }

    button {
      padding: 7px 13px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text-soft); cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      transition: all 0.15s ease; white-space: nowrap; letter-spacing: 0.01em;
    }
    button:hover { background: rgba(155,127,232,0.08); border-color: var(--border-hover); color: var(--text); }
    button:active { transform: scale(0.98); }

    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: #b096f0; border-color: #b096f0; }

    button.danger { border-color: rgba(224,122,138,0.25); color: var(--danger); background: transparent; }
    button.danger:hover { background: var(--danger-bg); border-color: rgba(224,122,138,0.45); }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field { display: flex; flex-direction: column; }

    .output-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; flex-direction: column;
      position: sticky; top: 76px; height: calc(100vh - 96px); overflow: hidden;
    }
    .output-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .output-title { font-size: 12px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.04em; }

    .status-bar { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-muted); transition: color 0.3s; }
    .status-bar.ok   { color: #3d9e7e; }
    .status-bar.err  { color: var(--danger); }
    .status-bar.warn { color: #9e7820; }

    .output-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
    .output-body::-webkit-scrollbar { width: 4px; }
    .output-body::-webkit-scrollbar-track { background: transparent; }
    .output-body::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    pre {
      font-family: 'DM Mono', monospace; font-size: 12px;
      line-height: 1.65; color: var(--text-soft);
      white-space: pre-wrap; word-break: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .output-panel { position: static; height: auto; min-height: 300px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="2" y="2" width="4" height="4" rx="1" fill="white" opacity="0.95"/>
        <rect x="8" y="2" width="4" height="4" rx="1" fill="white" opacity="0.65"/>
        <rect x="2" y="8" width="4" height="4" rx="1" fill="white" opacity="0.65"/>
        <rect x="8" y="8" width="4" height="4" rx="1" fill="white" opacity="0.95"/>
      </svg>
    </div>
    <h1>Slack Chatbot Dashboard</h1>
  </div>
  <span class="pill" id="pill">Idle</span>
</header>

<div class="wrap">
  <div class="sidebar">

    <!-- Connect -->
    <div class="panel">
      <div class="panel-header">
        <span class="step-badge">01</span>
        <span class="panel-title">Connect</span>
      </div>
      <div class="panel-body">
        <p class="hint">Connect a Slack workspace via OAuth. The UI will auto-select the workspace after install.</p>
        <div class="btn-group">
          <button class="primary" onclick="connectSlack()">Connect Slack</button>
          <button onclick="location.reload()">Refresh</button>
        </div>
        <div class="field">
          <label>Workspace</label>
          <select id="workspaceSelect" onchange="loadChannels()">
            <option value="">— No workspaces loaded —</option>
          </select>
        </div>
        <div class="btn-group">
          <button onclick="loadWorkspaces()">Load Workspaces</button>
          <button onclick="checkToken()">Token Status</button>
          <button class="danger" onclick="disconnectWorkspace()">Disconnect</button>
        </div>
      </div>
    </div>

    <!-- Channel -->
    <div class="panel">
      <div class="panel-header">
        <span class="step-badge">02</span>
        <span class="panel-title">Channel</span>
      </div>
      <div class="panel-body">
        <div class="field">
          <label>Channel</label>
          <select id="channelSelect">
            <option value="">— Load channels first —</option>
          </select>
        </div>
        <div class="btn-group">
          <button onclick="joinSelectedAndBackfill()">Join + Backfill</button>
          <button onclick="joinAllAndBackfill()">Join All Public</button>
          <button onclick="loadMessagesFromDB()">Load from DB</button>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="panel">
      <div class="panel-header">
        <span class="step-badge">03</span>
        <span class="panel-title">Search &amp; Summarize</span>
      </div>
      <div class="panel-body">
        <p class="hint">Coming soon — wire these once backend endpoints exist.</p>
        <div class="field">
          <label>Keyword</label>
          <input id="keyword" placeholder="e.g. deployment error" />
        </div>
        <div class="row-2">
          <div class="field">
            <label>From</label>
            <input id="fromDate" placeholder="YYYY-MM-DD" />
          </div>
          <div class="field">
            <label>To</label>
            <input id="toDate" placeholder="YYYY-MM-DD" />
          </div>
        </div>
        <div class="btn-group">
          <button onclick="placeholder('Search endpoint coming next')">Search</button>
          <button onclick="placeholder('Summarize endpoint coming next')">Summarize</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Output -->
  <div class="output-panel">
    <div class="output-header">
      <span class="output-title">Output</span>
      <span class="status-bar" id="status">Idle</span>
    </div>
    <div class="output-body">
      <pre id="out">{}</pre>
    </div>
  </div>
</div>

<script>
  // Derives API base from the current origin — works with S3+CloudFront or any custom domain
  function getApiBase(){
    return window.location.origin + "/api";
  }

  function setStatus(msg, type){
    const s = document.getElementById("status");
    const p = document.getElementById("pill");
    s.textContent = msg;
    s.className = "status-bar" + (type ? " " + type : "");
    p.textContent = msg.length > 24 ? msg.slice(0,24)+"…" : msg;
    p.className = "pill" + (type ? " " + type : "");
  }

  function show(obj){
    document.getElementById("out").textContent = JSON.stringify(obj, null, 2);
  }

  async function safeJson(r){
    const text = await r.text();
    try { return JSON.parse(text); } catch { return { ok:false, raw:text }; }
  }

  // ---------- Init ----------
  (function init(){
    const params = new URLSearchParams(window.location.search);
    const team = params.get("team_id") || params.get("team") || "";
    if (team) {
      localStorage.setItem("LAST_TEAM_ID", team);
      setStatus("OAuth complete: " + team, "ok");
      const url = new URL(window.location.href);
      url.searchParams.delete("team_id");
      url.searchParams.delete("team");
      window.history.replaceState({}, "", url.toString());
    } else {
      setStatus("Idle");
    }
    loadWorkspaces().catch(()=>{});
  })();

  // ---------- Actions ----------
  function connectSlack(){
    setStatus("Opening Slack OAuth…");
    window.open(getApiBase() + "/install", "_blank", "noopener,noreferrer");
  }

  async function loadWorkspaces(){
    try{
      setStatus("Loading workspaces…");
      const r = await fetch(getApiBase() + "/workspaces");
      const data = await safeJson(r);
      show(data);
      const sel = document.getElementById("workspaceSelect");
      sel.innerHTML = "";
      const list = data.workspaces || [];
      if (!data.ok) {
        sel.innerHTML = '<option value="">— failed to load workspaces —</option>';
        setStatus("Workspaces load failed", "err");
        return;
      }
      if (list.length === 0) {
        sel.innerHTML = '<option value="">— none connected yet —</option>';
        setStatus("No workspaces connected");
        return;
      }
      const last = localStorage.getItem("LAST_TEAM_ID") || "";
      list.forEach(w => {
        const opt = document.createElement("option");
        opt.value = w.team_id;
        opt.textContent = w.team_id + (w.team_name ? (" • " + w.team_name) : "");
        if (w.team_id === last) opt.selected = true;
        sel.appendChild(opt);
      });
      setStatus("Workspaces loaded", "ok");
      if (sel.value) loadChannels();
    }catch(e){
      show({ ok:false, error:String(e) });
      setStatus("Workspaces load failed", "err");
    }
  }

  async function checkToken(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      if(!team_id){ setStatus("Select a workspace first", "warn"); return; }
      setStatus("Checking token…");
      const r = await fetch(getApiBase() + "/token/status?team_id=" + encodeURIComponent(team_id));
      const data = await safeJson(r);
      show(data);
      if (data.ok && data.has_token) setStatus("Token OK", "ok");
      else setStatus("Token missing", "warn");
    }catch(e){
      show({ ok:false, error:String(e) });
      setStatus("Token check failed", "err");
    }
  }

  async function loadChannels(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      if(!team_id) return;
      setStatus("Loading channels…");
      const r = await fetch(getApiBase() + "/channels?team_id=" + encodeURIComponent(team_id));
      const data = await safeJson(r);
      show(data);
      const sel = document.getElementById("channelSelect");
      sel.innerHTML = "";
      if (!data.ok) {
        sel.innerHTML = '<option value="">— failed to load channels —</option>';
        setStatus("Channels load failed", "err");
        return;
      }
      const channels = data.channels || [];
      if (channels.length === 0) {
        sel.innerHTML = '<option value="">— no channels returned —</option>';
        setStatus("No channels", "warn");
        return;
      }
      channels.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = "#" + c.name;
        sel.appendChild(opt);
      });
      setStatus("Channels loaded", "ok");
    }catch(e){
      show({ ok:false, error:String(e) });
      setStatus("Channels load failed", "err");
    }
  }

  async function backfillOneChannel(team_id, channel_id){
    let cursor = "", totalStored = 0;
    while (true){
      const url = getApiBase() + "/backfill-channel?team_id=" + encodeURIComponent(team_id) +
        "&channel_id=" + encodeURIComponent(channel_id) + "&limit=200" +
        (cursor ? "&cursor=" + encodeURIComponent(cursor) : "");
      const r = await fetch(url, { method:"POST" });
      const data = await safeJson(r);
      if (!data.ok) return { ok:false, error:data };
      totalStored += (data.stored_new || 0);
      if (!data.has_more) break;
      cursor = data.next_cursor || "";
      await new Promise(res => setTimeout(res, 350));
    }
    return { ok:true, stored: totalStored };
  }

  async function joinSelectedAndBackfill(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      const channel_id = document.getElementById("channelSelect").value;
      if(!team_id || !channel_id){ setStatus("Select workspace + channel first", "warn"); return; }
      setStatus("Joining channel…");
      const r = await fetch(getApiBase() + "/join-channel?team_id=" + encodeURIComponent(team_id) +
        "&channel_id=" + encodeURIComponent(channel_id), { method:"POST" });
      const j = await safeJson(r);
      if(!j.ok){ show(j); setStatus("Join failed", "err"); return; }
      setStatus("Backfilling…");
      const bf = await backfillOneChannel(team_id, channel_id);
      show({ join: j, backfill: bf });
      if (bf.ok) setStatus("Done — " + bf.stored + " stored", "ok");
      else setStatus("Backfill failed", "err");
    }catch(e){
      show({ ok:false, error:String(e) });
      setStatus("Failed", "err");
    }
  }

  async function joinAllAndBackfill(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      if(!team_id){ setStatus("Select a workspace first", "warn"); return; }
      setStatus("Joining all public channels…");
      const r = await fetch(getApiBase() + "/join-all-public?team_id=" + encodeURIComponent(team_id), { method:"POST" });
      const j = await safeJson(r);
      if(!j.ok){ show(j); setStatus("Join-all failed", "err"); return; }
      const sel = document.getElementById("channelSelect");
      const channelIds = Array.from(sel.options).map(o => o.value).filter(v => v);
      if(!channelIds.length){ show(j); setStatus("No channels loaded", "warn"); return; }
      let total = 0, results = [];
      for (let i = 0; i < channelIds.length; i++){
        setStatus(`Backfilling ${i+1}/${channelIds.length}…`);
        const bf = await backfillOneChannel(team_id, channelIds[i]);
        results.push({ channel: channelIds[i], ...bf });
        if (bf.ok) total += bf.stored;
        await new Promise(res => setTimeout(res, 400));
      }
      show({ join_all: j, backfill_all: { total_stored: total, results }});
      setStatus("Done — " + total + " total stored", "ok");
    }catch(e){
      show({ ok:false, error:String(e) });
      setStatus("Failed", "err");
    }
  }

  async function loadMessagesFromDB(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      const channel_id = document.getElementById("channelSelect").value;
      if(!team_id || !channel_id){ setStatus("Select workspace + channel first", "warn"); return; }
      setStatus("Loading from DB…");
      const url = getApiBase() + "/db-messages?team_id=" + encodeURIComponent(team_id) +
        "&channel_id=" + encodeURIComponent(channel_id) + "&limit=50";
      const r = await fetch(url);
      const data = await safeJson(r);
      show(data);
      if (data.ok) setStatus("Loaded from DB", "ok");
      else setStatus("DB load failed", "err");
    }catch(e){
      show({ ok:false, error:String(e) });
      setStatus("DB load failed", "err");
    }
  }

  async function disconnectWorkspace(){
    try{
      const team_id = document.getElementById("workspaceSelect").value;
      if(!team_id) return;
      if(!confirm("Disconnect this workspace? This will revoke the token and delete the secret.")) return;
      setStatus("Disconnecting…");
      const r = await fetch(getApiBase() + "/workspaces/" + encodeURIComponent(team_id), { method:"DELETE" });
      const data = await safeJson(r);
      show(data);
      setStatus("Disconnected", "ok");
      await loadWorkspaces();
    }catch(e){
      show({ ok:false, error:String(e) });
      setStatus("Disconnect failed", "err");
    }
  }

  function placeholder(msg){ setStatus(msg, "warn"); }
</script>

</body>
</html>
